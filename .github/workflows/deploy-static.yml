name: Deploy Static Web

on:
  push:
    branches: [main]
    paths:
      - 'static-web/**'
      - 'nginx/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-static.yml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push static image
        uses: docker/build-push-action@v6
        with:
          context: ./static-web
          push: true
          tags: ${{ secrets.STATIC_IMAGE }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/UAS_ADM
            git pull origin main
            cat > .env <<'EOF'
            HTTP_PORT=80
            STATIC_IMAGE=${{ secrets.STATIC_IMAGE }}
            DYNAMIC_IMAGE=${{ secrets.DYNAMIC_IMAGE }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            EOF
            docker compose pull static-web
            docker compose up -d static-web nginx
