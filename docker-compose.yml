services:
  static-web:
    build:
      context: ./static-web
    image: ${STATIC_IMAGE:-gamine1/uas-static:latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - uas-network

  dynamic-app:
    build:
      context: ./dynamic-app
    image: ${DYNAMIC_IMAGE:-gamine1/uas-dinamic:latest}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "80"
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-uas_db}
      DB_USER: ${MYSQL_USER:-uas_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-uas_password}
    volumes:
      - ./dynamic-app/assets/uploads:/var/www/html/assets/uploads
    networks:
      - uas-network

  database:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-uas_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-uas_db}
      MYSQL_USER: ${MYSQL_USER:-uas_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-uas_password}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - uas-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - static-web
      - dynamic-app
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - uas-network

networks:
  uas-network:
    driver: bridge

volumes:
  mariadb-data:
